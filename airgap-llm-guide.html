<script>
const SRC = "# \ud3d0\uc1c4\ub9dd(Air-Gap) \ub85c\uceec LLM \uc778\ud504\ub77c \uad6c\ucd95 \uac00\uc774\ub4dc\n\n\uc778\ud130\ub137\uc774 \ucc28\ub2e8\ub41c \ud658\uacbd\uc5d0\uc11c Ubuntu \uc11c\ubc84(GPU) + Windows \ud074\ub77c\uc774\uc5b8\ud2b8(GUI) \uad6c\uc131\uc73c\ub85c\n\ub85c\uceec LLM \ucd94\ub860 \uc778\ud504\ub77c\ub97c \uad6c\ucd95\ud558\ub294 \uc808\ucc28 \uc815\ub9ac.\n\n![\uc544\ud0a4\ud14d\ucc98 \uc2dc\uac01\ud654](airgap_viz.png)\n\n---\n\n## 1. \ub124\ud2b8\uc6cc\ud06c \uc544\ud0a4\ud14d\ucc98 \ubc0f \ud1a0\ud3f4\ub85c\uc9c0\n\n**\uc5f0\uacb0 \ubc29\uc2dd**: 1\ub3001 LAN \ucf00\uc774\ube14 \uc9c1\uacb0 (\uc2a4\uc704\uce58/\ub77c\uc6b0\ud130/\uc778\ud130\ub137 \uc5c6\uc74c)\n\n| \uc7a5\ube44 | IP | \uc11c\ube0c\ub137 \ub9c8\uc2a4\ud06c | \uac8c\uc774\ud2b8\uc6e8\uc774 |\n|---|---|---|---|\n| Ubuntu Server | 10.x.x.x | 255.255.255.0 | 10.x.x.x |\n| Windows Client | 10.x.x.x | 255.255.255.0 | \uc5c6\uc74c |\n\n**\ubc29\ud654\ubcbd \uc815\ucc45**: Windows Defender \uc778\ubc14\uc6b4\ub4dc/\uc544\uc6c3\ubc14\uc6b4\ub4dc \uaddc\uce59\uc744 \ud1b5\ud574 TCP `11434` \ud3ec\ud2b8 \uac1c\ubc29\n\n---\n\n## 2. \ud504\ub808\uc784\uc6cc\ud06c \ubc0f \uc18c\ud504\ud2b8\uc6e8\uc5b4 \uc2a4\ud0dd\n\n\ud3d0\uc1c4\ub9dd \ud658\uacbd \ud2b9\uc131\uc0c1 **\ub2e8\uc77c \ubc14\uc774\ub108\ub9ac / \ub85c\uceec \ud328\ud0a4\uc9c0 \uad6c\ub3d9** \uac00\ub2a5\ud55c \ud504\ub808\uc784\uc6cc\ud06c\ub85c \uad6c\uc131.\n\n### \u2460 \ubc31\uc5d4\ub4dc \ucd94\ub860 \uc5d4\uc9c4 \u2014 Ollama (v0.x \ud504\ub9ac\ucef4\ud30c\uc77c\ub4dc)\n- \uc5ed\ud560: LLM \uad6c\ub3d9\uc6a9 \uacbd\ub7c9 \ubc31\uc5d4\ub4dc, \ubaa8\ub378 \uac00\uc0c1\ud654/\uac00\uc18d \uad00\ub9ac, RESTful API \uc81c\uacf5\n- \ud2b9\uc9d5\n  - Go \uc5b8\uc5b4 \uae30\ubc18 \u2192 \ub3c5\ub9bd \ubc14\uc774\ub108\ub9ac\ub85c \uc2e4\ud589 \uac00\ub2a5\n  - \ub0b4\ubd80\uc801\uc73c\ub85c `llama.cpp` \ubc31\uc5d4\ub4dc \ud65c\uc6a9 \u2192 CPU/GPU \ud558\uc774\ube0c\ub9ac\ub4dc \uc5f0\uc0b0 \ubc0f \uc591\uc790\ud654 \ubaa8\ub378 \ucd94\ub860\n  - `OLLAMA_HOST=0.0.0.0` \ud658\uacbd\ubcc0\uc218\ub85c \ubaa8\ub4e0 \ub124\ud2b8\uc6cc\ud06c \uc778\ud130\ud398\uc774\uc2a4\uc5d0\uc11c 11434 \ud3ec\ud2b8 \ub9ac\uc2a4\ub2dd\n\n### \u2461 \ud558\ub4dc\uc6e8\uc5b4 \uac00\uc18d \u2014 NVIDIA CUDA & Driver\n- CUDA \uac00\uc18d \ub4dc\ub77c\uc774\ubc84 \ub808\uc774\uc5b4 \uc704\uc5d0\uc11c \ub3d9\uc791\n- RTX A4000 (16GB VRAM)\uc5d0 \ubaa8\ub378 \ub808\uc774\uc5b4 \uc804\ub7c9 \ub85c\ub4dc (Full GPU Offloading) \u2192 \uc5f0\uc0b0 \uc9c0\uc5f0 \ucd5c\uc18c\ud654\n\n### \u2462 \ud504\ub860\ud2b8\uc5d4\ub4dc UI \u2014 Chatbox AI (v1.20.3)\n- \uc5ed\ud560: \uc0ac\uc6a9\uc790 \ucc44\ud305 \ud074\ub77c\uc774\uc5b8\ud2b8 (\ub370\uc2a4\ud06c\ud1b1 \ub124\uc774\ud2f0\ube0c GUI)\n- \ud1b5\uc2e0 \ubc29\uc2dd: \ub85c\uceec \ub124\ud2b8\uc6cc\ud06c HTTP, Ollama \ub124\uc774\ud2f0\ube0c API(OpenAI \ud638\ud658) \uc5d4\ub4dc\ud3ec\uc778\ud2b8 \uc0ac\uc6a9\n  `http://<Server_IP>:11434/api/chat`\n\n---\n\n## 3. \ud575\uc2ec \ubaa8\ub378 \uba85\uc138\n\n| \ud56d\ubaa9 | \ub0b4\uc6a9 |\n|---|---|\n| \ubaa8\ub378\uba85 | Gemma4 26B (\ube4c\ub4dc\uba85: `gemma4-26b`) |\n| \uac1c\ubc1c\uc0ac | Google |\n| \ud30c\ub77c\ubbf8\ud130 | 260\uc5b5 \uac1c (26B) |\n| \ud3ec\ub9f7 | GGUF (Weight + \uba54\ud0c0\ub370\uc774\ud130 \ub2e8\uc77c \ud30c\uc77c) |\n| \uc591\uc790\ud654 | RTX A4000 16GB VRAM \ud55c\uacc4 \ub0b4 \uc11c\ube59\uc744 \uc704\ud55c \uc815\ubc00\ub3c4 \uc591\uc790\ud654 \uc801\uc6a9 |\n| \uac15\uc810 | \ud55c\uad6d\uc5b4 \uc774\ud574\ub3c4, \uc815\ubc00 \ud504\ub86c\ud504\ud2b8 \uc9c0\uc2dc \uc774\ud589, \ucf54\ub4dc \uc0dd\uc131/\ub514\ubc84\uae45 \ud2b9\ud654 |\n\n---\n\n## 4. \uc778\ud504\ub77c \uad6c\ucd95 \uc808\ucc28 (A to Z)\n\n### [A] \uc0ac\uc804 \uc900\ube44 \u2014 \uc778\ud130\ub137 \uac00\ub2a5 \ub9dd\uc5d0\uc11c USB \ud328\ud0a4\uc9d5\n1. Hugging Face \ub4f1\uc5d0\uc11c `gemma4-26b` GGUF \ud30c\uc77c \ub2e4\uc6b4\ub85c\ub4dc \u2192 USB \uc800\uc7a5\n2. Windows\uc6a9 `Chatbox-1.20.3-Setup.exe` \ub2e4\uc6b4\ub85c\ub4dc\n3. \ub7f0\ud0c0\uc784 \uc758\uc874\uc131 `vc_redist.x64.exe` (MS Visual C++ Redistributable 2015\u20132022) \uc900\ube44\n\n### [B] 1\ub2e8\uacc4 \u2014 \ud558\ub4dc\uc6e8\uc5b4 \uacb0\uc18d \ubc0f \ub124\ud2b8\uc6cc\ud06c \ube0c\ub9bf\uc9d5\n\n1. \uc591 \uc11c\ubc84 LAN \ud3ec\ud2b8\uc5d0 \ucf00\uc774\ube14 \uc5f0\uacb0, \ud3ec\ud2b8 LED\ub85c \uacb0\uc18d \ud655\uc778\n2. Windows \uc774\ub354\ub137 \uc5b4\ub311\ud130 \uc18d\uc131 \uc9c4\uc785 (Intel/Aquantia \uc5b4\ub311\ud130 \ub300\uc751)\n3. TCP/IPv4 \uc218\ub3d9 \uc124\uc815\n   - IP: `10.x.x.x`\n   - Netmask: `255.255.255.0`\n4. Windows Defender \ubc29\ud654\ubcbd (\uac1c\uc778/\uacf5\uc6a9 \ub124\ud2b8\uc6cc\ud06c) \uc77c\uc2dc \uc885\ub8cc \u2014 \ud3ec\ud2b8 \ube14\ub85c\ud0b9 \ubc29\uc9c0\n5. `ping 10.x.x.x` \uc2e4\ud589 \u2192 \ud328\ud0b7 \uc190\uc2e4 0%, \uc751\ub2f5\uc18d\ub3c4 <1ms \ud655\uc778\n\n### [C] 2\ub2e8\uacc4 \u2014 Ubuntu \ubc31\uc5d4\ub4dc \ubaa8\ub378 \ube4c\ub4dc \ubc0f \ud3ec\ud2b8 \uac1c\ubc29\n1. `.gguf` \ud30c\uc77c + `Modelfile`\uc744 \uc6b0\ubd84\ud22c \ub85c\uceec \ub514\ub809\ud1a0\ub9ac\uc5d0 \ubc30\uce58\n2. \ubaa8\ub378 \ube4c\ub4dc \ubc0f \ub4f1\ub85d\n   ```bash\n   ollama create gemma4-26b -f Modelfile\n   ```\n3. \uc678\ubd80 \uc694\uccad \uc218\uc2e0\uc744 \uc704\ud574 \uc804\uccb4 \uc778\ud130\ud398\uc774\uc2a4 \ubc14\uc778\ub529 \ud6c4 \uc11c\ubc84 \uad6c\ub3d9\n   ```bash\n   OLLAMA_HOST=0.0.0.0 ollama serve\n   ```\n4. (\uc120\ud0dd) GPU \uc0c1\ud0dc \ubaa8\ub2c8\ud130\ub9c1\uc6a9 \ubcf4\uc870 \ud130\ubbf8\ub110\n   ```bash\n   watch -n 0.5 nvidia-smi\n   ```\n\n### [D] 3\ub2e8\uacc4 \u2014 Windows \ud074\ub77c\uc774\uc5b8\ud2b8 \uc758\uc874\uc131 \ud574\uacb0 \ubc0f \uc5f0\ub3d9\n1. USB \uc5f0\uacb0 \u2192 `vc_redist.x64.exe` \uc124\uce58 \u2192 \uc7ac\ubd80\ud305\n2. `Chatbox-1.20.3-Setup.exe` \uc2e4\ud589 \uc124\uce58\n   - \uc2a4\ub9c8\ud2b8\uc2a4\ud06c\ub9b0 \uacbd\uace0 \uc2dc [\ucd94\uac00 \uc815\ubcf4] \u2192 \uac15\uc81c \uc2e4\ud589\n3. \ucd5c\ucd08 \uc2e4\ud589 \uc2dc \ud074\ub77c\uc6b0\ub4dc \ub85c\uadf8\uc778 \ud31d\uc5c5 \u2192 [\uac74\ub108\ub6f0\uae30(Skip)] \u2192 \uc624\ud504\ub77c\uc778 \ub85c\uceec \uce90\uc2dc \ubaa8\ub4dc \uc804\ud658\n4. \uc124\uc815 \u2192 \ubaa8\ub378(Model) \ud0ed\n   - AI \uc11c\ube44\uc2a4 \uc81c\uacf5\uc790: **Ollama**\n   - API \ud638\uc2a4\ud2b8 \uc8fc\uc18c: `http://10.x.x.x:11434`\n   - [\uc0c8\ub85c\uace0\uce68] \u2192 `gemma4-26b` \ubaa8\ub378 \uac80\uc0c9\u00b7\uc120\ud0dd \u2192 [\uc800\uc7a5]\n";
